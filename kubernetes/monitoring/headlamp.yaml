apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: headlamp
rules:
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["notification.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["image.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp
subjects:
  - kind: ServiceAccount
    name: headlamp
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: headlamp
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: headlamp-plugins
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headlamp
  template:
    metadata:
      labels:
        app: headlamp
    spec:
      serviceAccountName: headlamp
      initContainers:
        - name: flux-plugin
          image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0
          command: ["/bin/sh", "-c"]
          args:
            - cp -r /plugins/flux /output/
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: plugins
              mountPath: /output
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:v0.42.0
          args:
            - -in-cluster
            - -plugins-dir=/headlamp/plugins
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
          ports:
            - containerPort: 4466
          volumeMounts:
            - name: plugins
              mountPath: /headlamp/plugins
      volumes:
        - name: plugins
          persistentVolumeClaim:
            claimName: headlamp-plugins
---
apiVersion: v1
kind: Service
metadata:
  name: headlamp
  namespace: monitoring
spec:
  selector:
    app: headlamp
  ports:
    - port: 4466
      targetPort: 4466
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp-tailscale
  namespace: monitoring
spec:
  defaultBackend:
    service:
      name: headlamp
      port:
        number: 4466
  ingressClassName: tailscale
  tls:
    - hosts:
        - headlamp
