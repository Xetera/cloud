apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: shoal
  namespace: flux-system
spec:
  type: github
  events:
    - "ping"
    - "push"
    - "package"
    - "workflow_run"
  secretRef:
    name: flux-webhook-token
  resources:
    - kind: GitRepository
      name: shoal
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: shoal
      namespace: flux-system
