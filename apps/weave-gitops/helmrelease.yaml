apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weave-gitops
  namespace: flux-system
spec:
  interval: 60m
  chart:
    spec:
      chart: weave-gitops
      version: "4.0.36"
      sourceRef:
        kind: HelmRepository
        name: weave-gitops
        namespace: flux-system
      interval: 60m
  values:
    adminUser:
      create: true
      createSecret: false
      username: admin
    ingress:
      enabled: true
      className: tailscale
      hosts:
        - host: gitops
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: weave-gitops
                  port:
                    name: http
      tls:
        - hosts:
            - gitops
